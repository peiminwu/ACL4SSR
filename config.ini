[custom]

;指定美国
ruleset=🇺🇸美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/LinkedIn/LinkedIn.list
ruleset=🇺🇸美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/TruthSocial/TruthSocial.list
ruleset=🇺🇸美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Gemini/Gemini.list
ruleset=🇺🇸美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/OpenAI/OpenAI.list
ruleset=🇺🇸美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Anthropic/Anthropic.list

;指定direct
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/China/China.list
ruleset=DIRECT,[]GEOIP,CN

;剩下全部proxy
ruleset=🗽PROXY,[]FINAL

;设置分组标志位
custom_proxy_group=🗽PROXY`select`[]🇭🇰香港`[]🇺🇸美国`[]🌍其他`[]⚙️手动`[]DIRECT`
custom_proxy_group=⚙️手动`select`.*
custom_proxy_group=🇭🇰香港`url-test`(香|HK)`http://www.gstatic.com/generate_204,,150
custom_proxy_group=🇺🇸美国`url-test`(美|US)`http://www.gstatic.com/generate_204,,150
custom_proxy_group=🌍其他`url-test`^(?!.*(香|HK|美|US|网址|重置)).*$`https://twitter.com/favicon.ico`300,,150

enable_rule_generator=true
overwrite_original_rules=true
